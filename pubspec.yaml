name: tube_quiz
description: >-
  Music Quiz Master – A companion app for YouTube Music and Amazon Music that
  monitors playback, announces tracks via TTS, and runs automated
  "Guess the Song" snippet quizzes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # File picker for CSV import
  file_picker: ^6.1.1

  # CSV parsing
  csv: ^6.0.0

  # Text-to-Speech
  flutter_tts: ^4.0.2

  # Fuzzy string matching
  fuzzywuzzy: ^1.1.6

  # Shared preferences for settings persistence
  shared_preferences: ^2.2.2

  # App version info
  package_info_plus: ^8.3.0

  # Foreground service
  flutter_foreground_task: ^6.1.3

  # Permission handling
  permission_handler: ^11.1.0

  # Path provider
  path_provider: ^2.1.1

  # Material design icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/
